# ─────────────────────────────────────────────────────────────────────────────
# AAP Panel — Railway deployment config
# https://docs.railway.app/reference/config-as-code
#
# Prerequisites (Railway dashboard):
#   1. Add Redis plugin → copy REDIS_URL → set as env var in this service
#   2. Set all required env vars (see .env.production.example)
#   3. Deploy: push to Leximos_features or connect repo in Railway UI
# ─────────────────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects PORT — ecosystem.config.cjs picks it up for Next.js shell
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
