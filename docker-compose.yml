version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# AAP Panel — Docker Compose
#
# Services:
#   aap   — monolithic container: Next.js shell + 6 Fastify microservices
#           (all on 127.0.0.1 inside the container, managed by pm2-runtime)
#   redis — Redis 7 sidecar for caching
#
# Usage:
#   cp .env.production.example .env.production   # fill in secrets
#   docker compose up -d --build
#   docker compose logs -f aap
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Main application container ─────────────────────────────────────────────
  aap:
    build:
      context: .
      dockerfile: Dockerfile
    image: aap-panel:latest
    container_name: aap-panel
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-3777}:3777"   # override HOST_PORT to serve on a different host port

    env_file:
      - .env.production             # copy from .env.production.example and fill secrets

    environment:
      NODE_ENV: production
      # Redis sidecar — override the default 127.0.0.1
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Panel origin used for CORS + internal health-check links
      PANEL_ORIGIN: "${PANEL_ORIGIN:-http://localhost:3777}"

    volumes:
      # Mount host workspace so the file-browser / repo-scanner can see your repos
      - "${WORKSPACE_PATH:-/opt/workspace}:/workspace:ro"
      # Persistent PM2 logs (optional — pm2-runtime also writes to stdout)
      - aap_logs:/app/logs

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3777/"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ── Redis sidecar ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aap-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  aap_logs:
    driver: local
